name: Monitor de precios Samsung

permissions:
  contents: write

on:
  schedule:
    # Chile continental esta en UTC-4 (verano) / UTC-3 (invierno) -- estos
    # horarios en UTC estan calculados para invierno (UTC-3, vigente en julio).
    # Van a correr 1 hora antes/despues de lo pedido durante el horario de
    # verano hasta que se reajuste (pedido operador 2026-07-21: 01, 03, 09,
    # 12, 15, 18, 21, 23 hora Chile).
    - cron: "0 4 * * *"  # 01:00 Chile
    - cron: "0 6 * * *"  # 03:00 Chile
    - cron: "0 12 * * *" # 09:00 Chile
    - cron: "0 15 * * *" # 12:00 Chile
    - cron: "0 18 * * *" # 15:00 Chile
    - cron: "0 21 * * *" # 18:00 Chile
    - cron: "0 0 * * *"  # 21:00 Chile
    - cron: "0 2 * * *"  # 23:00 Chile
  workflow_dispatch: {}

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: monitor-samsung
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Revisar precios
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run run

      - name: Guardar historial y ultimo estado
        run: |
          git config user.name "monitor-samsung-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/history.jsonl
          git diff --cached --quiet && echo "sin cambios que commitear" && exit 0
          git commit -m "chore: actualiza datos $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
